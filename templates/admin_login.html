<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin | Herencia de Acero</title>
  <style>
    :root {
      --gold: #d4af37;
      --gold-2: #e8c547;
      --bg: #0f0f16;
      --panel: #151627;
      --text: #e6e6e6;
      --muted: #9aa0a6;
      --danger: #dc3545;
      --success: #28a745;
      --warning: #ffc107;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      color: var(--text);
      background: linear-gradient(rgba(11, 11, 18, 0.45), rgba(20, 22, 39, 0.45)), url('/static/Contantos.png') center/cover no-repeat fixed;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: var(--panel);
      border: 1px solid rgba(212, 175, 55, 0.25);
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35), inset 0 0 0 1px rgba(255,255,255,0.03);
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
      justify-content: center;
    }
    .brand img { width: 40px; height: 40px; object-fit: contain; }
    .brand h1 {
      margin: 0;
      font-size: 20px;
      letter-spacing: 1px;
      background: linear-gradient(135deg, var(--gold), var(--gold-2));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-weight: 700;
      text-transform: uppercase;
    }
    .subtitle {
      text-align: center;
      margin: 0 0 18px 0;
      color: var(--muted);
      font-size: 14px;
    }
    form { display: grid; gap: 14px; }
    label { font-size: 13px; color: var(--muted); }
    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.08);
      background: #0f1020;
      color: var(--text);
      outline: none;
    }
    input[type="text"]:focus, input[type="password"]:focus {
      border-color: rgba(212, 175, 55, 0.6);
      box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.15);
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid rgba(212, 175, 55, 0.6);
      color: #000;
      font-weight: 700;
      background: linear-gradient(135deg, var(--gold), var(--gold-2));
      cursor: pointer;
    }
    .btn:hover { filter: brightness(1.05); }
    .messages { display: grid; gap: 8px; margin: 10px 0 16px 0; }
    .msg {
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
      border: 1px solid rgba(255,255,255,0.08);
      background: #101226;
    }
    .msg.success { border-color: rgba(40, 167, 69, 0.5); background: rgba(40,167,69,0.1); }
    .msg.error { border-color: rgba(220, 53, 69, 0.5); background: rgba(220,53,69,0.1); }
    .msg.warning { border-color: rgba(255, 193, 7, 0.5); background: rgba(255,193,7,0.08); }
    .footer { text-align: center; margin-top: 12px; color: var(--muted); font-size: 12px; }
    a { color: var(--gold-2); text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <img src="{{ url_for('logo_png') }}" alt="Herencia de Acero" />
      <h1>Herencia de Acero</h1>
    </div>
    <p class="subtitle">Acceso Administrativo</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="messages">
          {% for category, message in messages %}
            <div class="msg {{ category }}">{{ message }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <form method="post" action="{{ url_for('admin') }}">
      <div>
        <label for="usuario">Usuario</label>
        <input id="usuario" name="usuario" type="text" placeholder="Ingresa tu usuario" required />
      </div>
      <div>
        <label for="password">Contraseña</label>
        <input id="password" name="password" type="password" placeholder="••••••••" required />
      </div>
      <button class="btn" type="submit">Iniciar sesión</button>
    </form>

    <div class="footer">
      <a href="{{ url_for('index') }}">← Volver al sitio</a>
    </div>
  </div>
</body>
</html>
